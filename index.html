<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>To-Do-List</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="Todo.png">
</head>
<body>

<div class="container">
  <h1 data-key="title">To-Do List</h1>

  <select id="language">
    <option value="en">English</option>
    <option value="am">አማርኛ</option>
  </select>

  <div class="input-section">
    <input type="text" id="taskInput" data-placeholder="input" placeholder="Enter task">
    <button id="addBtn" data-key="add">Add</button>
  </div>

  <ul id="taskList"></ul>
</div>

<script src="script.js"></script>
</body>
</html>
